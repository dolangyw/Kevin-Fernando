<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinta Itu Apa?</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030305;
            color: #f0f0f0;
            font-family: 'EB Garamond', 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.5s ease;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, #000 110%);
            pointer-events: none;
            z-index: 2;
        }

        #start-screen {
            position: absolute;
            z-index: 10;
        }

        #start-btn {
            padding: 15px 35px;
            font-size: 16px;
            color: white;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: 'EB Garamond', serif;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 1s ease;
        }

        #start-btn:hover {
            background: rgba(216, 182, 113, 0.1);
            box-shadow: 0 0 30px rgba(216, 182, 113, 0.4);
            transform: scale(1.05);
            border-color: #d8b671;
        }

        #quote-container {
            width: 85%;
            max-width: 900px;
            z-index: 5;
            display: none;
            position: absolute;
        }

        #quote-text {
            font-size: 30px;
            line-height: 2.2;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            font-weight: 300;
        }

        #photo-container {
            position: absolute;
            z-index: 5;
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        #photo-container img {
            max-width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1), 0 0 100px rgba(230, 126, 34, 0.2);
            filter: sepia(30%) brightness(0.8) contrast(1.2);
            transition: all 5s ease;
            transform: scale(0.95);
        }

        .show-photo {
            opacity: 1 !important;
        }

        .show-photo img {
            transform: scale(1) !important;
        }

        .photo-caption {
            margin-top: 20px;
            font-size: 20px;
            color: #d8b671;
            letter-spacing: 2px;
            opacity: 0.8;
            transition: opacity 2s ease;
        }

        .show-quote {
            opacity: 0;
            animation: blurFadeIn 2.5s forwards;
        }

        .hide-quote {
            opacity: 1;
            animation: blurFadeOut 2s forwards;
        }

        @keyframes blurFadeIn {
            0% { opacity: 0; filter: blur(15px); transform: scale(0.95); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes blurFadeOut {
            0% { opacity: 1; filter: blur(0px); transform: scale(1); }
            100% { opacity: 0; filter: blur(15px); transform: scale(1.05); }
        }

        .glitch-memory {
            animation: blurFadeIn 2.5s forwards, memoryDistortion 1.5s ease-in-out;
        }

        @keyframes memoryDistortion {
            0%, 100% { transform: translate(0); filter: none; text-shadow: 0 0 20px rgba(0, 0, 0, 0.9); }
            12% { transform: translate(-3px, 2px) skewX(2deg); filter: contrast(1.5) brightness(1.2); text-shadow: 2px 0 #8c7ae6, -2px 0 #ff9f43; }
            16% { transform: translate(3px, -1px) skewX(-2deg); filter: none; text-shadow: none; }
            20% { transform: translate(0); }
            70% { transform: translate(0); }
            73% { transform: translate(2px, -2px); filter: blur(1px); text-shadow: -2px 0 #ff9f43, 2px 0 #8c7ae6; }
            76% { transform: translate(-1px, 1px); filter: none; text-shadow: none; }
        }

        .epilogue-text {
            margin-top: 20px;
            font-size: 24px;
            font-weight: 300;
            color: #f0f0f0;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #the-end {
            position: absolute;
            z-index: 20;
            font-size: 40px;
            letter-spacing: 8px;
            color: #d8b671;
            text-transform: uppercase;
            opacity: 0;
            display: none;
            transition: opacity 3s ease-in-out;
        }

        span.highlight-fire {
            color: #ff9f43;
            font-weight: bold;
            display: inline-block;
            animation: firePulse 3s infinite alternate;
        }

        span.highlight-green {
            color: #39ff14;
            font-weight: bold;
            display: inline-block;
            animation: greenPulse 3s infinite alternate;
        }

        @keyframes greenPulse {
            0% { text-shadow: 0 0 10px rgba(80, 255, 120, 0.5); }
            100% { text-shadow: 0 0 25px rgba(80, 255, 120, 0.9); }
        }

        @keyframes firePulse {
            0% { text-shadow: 0 0 10px rgba(255, 159, 67, 0.5); }
            100% { text-shadow: 0 0 25px rgba(255, 159, 67, 0.9); }
        }

        span.highlight-pain {
            color: #8c7ae6;
            font-style: italic;
            text-shadow: 0 0 15px rgba(140, 122, 230, 0.5);
        }

        span.highlight-flicker-out {
            color: #7f8fa6;
            animation: flickerOut 7s forwards;
        }

        @keyframes flickerOut {
            0% { opacity: 1; color: #f5f6fa; text-shadow: 0 0 15px #f5f6fa; }
            50% { opacity: 0.5; color: #dcdde1; }
            70% { opacity: 1; color: #7f8fa6; text-shadow: none; }
            100% { opacity: 0.2; color: #353b48; }
        }

        @keyframes redFlashAnimation {
            0% { background-color: #030305; }
            15% { background-color: #5c0606; }
            100% { background-color: #030305; }
        }

        .flash-red-bg {
            animation: redFlashAnimation 1.2s ease-out forwards;
        }

        #photo-flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./photo1.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0;
            pointer-events: none;
            z-index: 3; 
        }

        @keyframes photoFlashAnimation {
            0% { opacity: 0; filter: blur(15px) brightness(1.8); }
            15% { opacity: 0.35; filter: blur(4px) brightness(1.2); }
            100% { opacity: 0; filter: blur(20px) brightness(0.2); }
        }

        .flash-photo-active {
            animation: photoFlashAnimation 1.8s ease-out forwards;
        }

        @media (max-width: 600px) {
            #quote-text {
                font-size: 22px;
                line-height: 1.8;
            }

            #photo-container img {
                max-width: 250px;
            }

            .epilogue-text {
                font-size: 18px;
            }
        }
    </style>
</head>
